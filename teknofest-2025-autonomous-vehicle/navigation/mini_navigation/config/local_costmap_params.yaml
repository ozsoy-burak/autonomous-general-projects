local_costmap:
  global_frame: map
  robot_base_frame: base_link
  update_frequency: 50.0
  publish_frequency: 15.0
  #static_map: false   
  rolling_window: true       #If static sets true,this param must to set ture
  always_send_full: true    #default is false
  width: 15.0
  height: 15.0
  resolution: 0.05
 

  #footprint: [[-0.18, 0.22], [-0.18, -0.22], [0.2425, -0.22], [0.2425,0.22]]
  #footprint: [[-0.18, 0.22], [-0.18, -0.22], [0.2425, -0.22], [0.2425,0.22]]
  footprint: [[-1.3, 0.5], [-1.3, -0.5], [1.3, -0.5], [1.3, 0.5]]
  plugins:
      - {name: static,    type: "costmap_2d::StaticLayer"}
      - {name: sensor,    type: "costmap_2d::ObstacleLayer"}
      - {name: inflation, type: "costmap_2d::InflationLayer"}

  inflation:
      enabled: true
      inflation_radius: 35.0
      
#cost_scaling_factor: 10
  
  static:
      enabled: true

  sensor:
        observation_sources: laser_scan
        laser_scan: {sensor_frame: velodyne, data_type: LaserScan, topic: scan_3d, marking: true, clearing: true, expected_update_rate: 0.2}
